<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>AI Chat - DeepSeek</title>
  <style>
    body { max-width: 800px; margin: 0 auto; padding: 20px; font-family: sans-serif; }
    #messages { border: 1px solid #ddd; height: 400px; overflow-y: auto; padding: 10px; margin-bottom: 10px; background: #f9f9f9; }
    .user { color: #0066cc; margin: 10px 0; padding: 8px; background: #e6f2ff; border-radius: 8px; }
    .assistant { color: #006600; margin: 10px 0; padding: 8px; background: #e6ffe6; border-radius: 8px; }
    #inputArea { display: flex; gap: 10px; }
    input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
    button { padding: 10px 20px; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #0052a3; }
    .loading { color: #999; font-style: italic; }
  </style>
</head>
<body>
  <h1>🤖 DeepSeek AI Chat</h1>
  <div id="messages"></div>
  <div id="inputArea">
    <input type="text" id="userInput" placeholder="输入消息..." onkeypress="if(event.key==='Enter')sendMessage()">
    <button onclick="sendMessage()">发送</button>
  </div>

  <script>
    // const API_KEY = 'sk-你的实际APIkey';  // 换成你的DeepSeek Key
    const API_KEY = 'sk-';  // 换成你的DeepSeek Key
    const API_URL = 'https://api.deepseek.com/chat/completions';


    // function calling
    const tools = [
      {
        type: "function",
        function: {
          name: "get_weather",
          description: "获取指定城市的当前天气信息",
          parameters: {
            type: "object",
            properties: {
              city: {
                type: "string",
                description: "城市名称，如'北京'、'上海'"
              }
            },
            required: ["city"]
          }
        }
      }
    ];

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const message = input.value.trim();
      if (!message) return;
      appendMessage('user', message);
      input.value = '';
      const loadingId = appendMessage('assistant', '思考中...', true);

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${API_KEY}`
          },
          body: JSON.stringify({
            model: 'deepseek-chat',
            messages: [
              { role: 'system', content: 'You are a helpful assistant.' },
              { role: 'user', content: message }
            ],
            stream: true  // 流式输出
          })
        });

        /*
        const data = await response.json();
        removeMessage(loadingId);
        
        if (data.choices && data.choices[0]) {
          appendMessage('assistant', data.choices[0].message.content);
          console.log('Token使用情况:', data.usage);
        } else {
          appendMessage('assistant', '出错了: ' + JSON.stringify(data));
        }
         */

        // 处理流式响应 start...
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let aiMessageId = appendMessage('assistant', '');
        
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          
          const chunk = decoder.decode(value);
          const lines = chunk.split('\n').filter(line => line.trim());
          
          for (const line of lines) {
            if (line.startsWith('data: ')) {
              const data = line.slice(6);
              if (data === '[DONE]') continue;
              
              try {
                const json = JSON.parse(data);
                const content = json.choices[0].delta.content || '';
                appendToMessage(aiMessageId, content);
              } catch (e) {
                // 忽略解析错误
              }
            }
          }
        }

        // 处理流式响应 end...
      } catch (error) {
        removeMessage(loadingId);
        appendMessage('assistant', '请求失败: ' + error.message);
      }
    }

    function appendMessage(role, content, isLoading = false) {
      const div = document.createElement('div');
      div.className = role + (isLoading ? ' loading' : '');
      div.textContent = (role === 'user' ? '👤 你: ' : '🤖 AI: ') + content;
      div.id = 'msg-' + Date.now();
      document.getElementById('messages').appendChild(div);
      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
      return div.id;
    }

    function appendToMessage(id, content) {
      const el = document.getElementById(id);
      if (el) {
        el.textContent += content;
        document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
      }
    }

    function removeMessage(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }
  </script>
</body>
</html>
